# ── Packages ──────────────────────────────────────────────────────────
# Each package entry:
#   category    = "..."        required, must match a [categories] key
#   type        = "lib|tool"   default: lib
#   stdlib      = true/false   default: false
#   import_name = "..."        only when import name differs from package name
#
# Per-checker config lives in subtables: [packages.NAME.side_effects]
# Use subtable form ([packages.NAME]) when you need per-checker config.
# Use inline form (NAME = { ... }) for identity-only entries.

