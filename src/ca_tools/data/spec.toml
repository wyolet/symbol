# ── Side effects ──────────────────────────────────────────────────────
# Global rules for the side_effects checker.
# Per-package overrides live under [checkers.side_effects] in package specs.
#
# Severity resolution order (highest wins):
#   1. [checkers.side_effects] severity  — package-specific override
#   2. [checkers.side_effects.patterns]  — file basename role
#   3. default WARNING

[checkers.side_effects]
severity = "warning"

# Call names by severity: skip = never flagged, error = always flagged even if uppercase.
# Only stdlib/builtins here — framework-specific entries belong in their package specs.
[checkers.side_effects.calls]
skip = [
    # Logging
    "getLogger",
    "basicConfig",
    # Type system
    "TypeVar",
    "NewType",
    "ParamSpec",
    "TypeVarTuple",
    "namedtuple",
    # Path constructors
    "Path",
    "PurePath",
    # Enums
    "Enum",
    "IntEnum",
    "StrEnum",
    # Deprecation warnings — standard shim pattern on import
    "warn",
    # Warning filter suppression — common in __init__.py
    "filterwarnings",
    # Type checker directive — not real runtime call
    "reveal_type",
]
error = [
    "configure",
    "setup",
    "init",
    "register",
    "connect",
    "patch",
]

# File patterns — maps severity level to list of basenames.
# debug   = side effects are EXPECTED here (entry points, config, app wiring)
# error   = side effects are UNEXPECTED here (pure logic modules — almost always a bug)
# warning = default for everything not listed (no entry needed)
[checkers.side_effects.patterns]
debug = [
    # Generic entry points
    "main.py",
    "__main__.py",
    "run.py",
    "app.py",
    "server.py",
    "start.py",
    # Config / environment
    "settings.py",
    "config.py",
    "configuration.py",
    "env.py",
    # WSGI/ASGI adapters
    "wsgi.py",
    "asgi.py",
    # Test infrastructure
    "conftest.py",
]
error = [
    # Data layer
    "models.py",
    "schemas.py",
    "serializers.py",
    "types.py",
    "enums.py",
    "constants.py",
    # Business logic
    "utils.py",
    "helpers.py",
    "validators.py",
    "mixins.py",
    "decorators.py",
    # Error handling
    "exceptions.py",
    "errors.py",
]

# Package-level side_effects config lives under [checkers.side_effects] in package specs.
# The global package_roles section is no longer needed — per-package config
# is more precise and keeps everything co-located with the package definition.

# ── Entry points ──────────────────────────────────────────────────────
# Patterns for detecting application entry points.

[entrypoints]
# Full dotted call paths that mark an entry point (e.g. inside if __name__ guard).
starters = [
    "uvicorn.run",
    "uvicorn.main",
    "gunicorn.run",
    "celery.start",
    "celery.worker_main",
    "flask.run",
    "app.run",
    "tornado.ioloop.IOLoop.current().start",
    "asyncio.run",
    "typer.run",
]

# Bare function names that typically indicate entry points.
starter_names = [
    "run",
    "start",
    "main",
    "worker_main",
    "serve",
]


# ── Checker file collection ───────────────────────────────────────────
# Glob patterns excluded from AST analysis (checker layer).
# Projects can extend via [tool.ca-tools.checker] exclude = [...].

[checker]
exclude = [
    "**/.venv/**", "**/venv/**", "**/env/**",
    "**/__pycache__/**", "**/node_modules/**",
    "**/.tox/**", "**/.mypy_cache/**", "**/.pytest_cache/**",
    "**/build/**", "**/dist/**", "**/*.egg-info/**",
]

# ── Scanner file collection ───────────────────────────────────────────
# Glob patterns excluded from LOC counting (scanner layer).
# Projects can extend via [tool.ca-tools.scanner] exclude = [...].

[scanner]
exclude = [
    "**/.venv/**", "**/venv/**", "**/env/**",
    "**/__pycache__/**", "**/node_modules/**",
    "**/.tox/**", "**/.mypy_cache/**",
    "**/build/**", "**/dist/**",
]

# ── Stack checker config ──────────────────────────────────────────────
# Categories that count as "primary stack" in audit output.
# Must match keys defined in [categories].

[stack]
primary_categories = [
    "web", "orm", "database_driver", "task_queue", "llm", "migration",
]

# ── Orphan checker defaults ───────────────────────────────────────────
# Files skipped from orphan detection globally. Framework packages extend
# this via [packages.X.orphan] patterns.

[checkers.orphan]
skip_patterns = [
    # Python implicit entry points — always reachable by convention
    "__init__.py", "__main__.py", "setup.py", "manage.py",
    # Conventional WSGI/ASGI/app entrypoints — run by servers, not imported
    "main.py", "app.py", "server.py", "run.py", "wsgi.py", "asgi.py",
    # Test infrastructure
    "conftest.py", "test_*.py", "*_test.py",
    # Standalone example/demo scripts — not part of the importable package
    "examples/*.py", "*/examples/*.py",
    "demos/*.py", "*/demos/*.py",
    # Sphinx/MkDocs config and extensions — run/loaded by docs tooling, not imported
    "docs/conf.py", "*/conf.py",
    "*sphinxext.py", "docs/**/_ext/*.py",
    # Noxfile / task runners at project root
    "noxfile.py", "tasks.py",
    # MkDocs hooks — loaded by mkdocs via hooks: config key
    "mkdocs_hooks.py", "*_hooks.py",
    # PyInstaller hooks — loaded by build tooling by filename
    "hook-*.py",
    # Snapshot test fixtures — loaded by syrupy/inline-snapshot by path, not import
    "*/snapshots/**/*.py",
    # Vendored libraries — high false positive rate, not part of project import graph
    "_vendor/**/*.py", "*/vendor/**/*.py",
    # Tests data/fixtures read as text, never imported
    "tests/data/**/*.py", "*/tests/data/**/*.py",
    # Benchmark scripts
    "benchmarks/*.py", "*/benchmarks/*.py",
    # pytest also discovers tests_ prefix (not just test_)
    "tests_*.py",
    # Hatch build hooks
    "hatch_build.py",
]

# ── ca init config ────────────────────────────────────────────────────
# Patterns used by ca init to auto-generate ignore lists.

[init]
# Side-effect call patterns considered expected/intentional — auto-added to ignore list.
safe_side_effect_patterns = [
    "*.include_router()",
    "*.add_middleware()",
    "*.add_route()",
    "*.add_event_handler()",
    "*.register_blueprint()",
    "*.add_url_rule()",
    "*.register()",
]
