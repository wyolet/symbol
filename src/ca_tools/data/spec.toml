# ca-tools built-in spec — community-maintained detection patterns.
# Full schema reference: docs/spec-schema.md
#
# To contribute: add packages, checker configs, or framework rules here.
# No Python code changes needed — the spec is the extension point.
#
# Loading order (later overrides earlier):
#   1. This file (built-in)
#   2. Plugin specs (installed packages via entry points)
#   3. Project spec (ca-tools.spec.toml at project root)
#
# ── Package entry shape ───────────────────────────────────────────────
# [packages.NAME]
#   category    = "..."        # required, must match a [categories] key
#   type        = "lib|tool|app"  # required
#   stdlib      = false        # true for stdlib modules
#   import_name = "..."        # only when import name differs from package name
#
# [packages.NAME.side_effects]
#   module_level = "debug|info|warning|error|critical"
#                              # severity when called at module level
#                              # default: warning
# ─────────────────────────────────────────────────────────────────────

# ── Categories ────────────────────────────────────────────────────────
# Maps internal category keys to display-friendly labels.
# Every package must reference a category defined here.

[categories]
web = "Web framework"
orm = "ORM"
database_driver = "Database"
task_queue = "Task queue"
llm = "LLM / AI"
migration = "Migrations"
testing = "Testing"
http_client = "HTTP client"
validation = "Validation"
serialization = "Serialization"
cli = "CLI"
monitoring = "Monitoring"
auth = "Auth"
data_science = "Data science"
config = "Config"
templating = "Templating"
file_handling = "File handling"
cloud = "Cloud"
utility = "Utility"
async = "Async"
caching = "Caching"
graphql = "GraphQL"
websocket = "WebSocket"
email = "Email"
scheduling = "Scheduling"
feature_flags = "Feature flags"
i18n = "i18n"
rate_limiting = "Rate limiting"
admin = "Admin"
payment = "Payment"
search = "Search"
grpc = "gRPC"
orchestration = "Orchestration"

# ── Packages ──────────────────────────────────────────────────────────
# Each package entry:
#   category    = "..."        required, must match a [categories] key
#   type        = "lib|tool"   default: lib
#   stdlib      = true/false   default: false
#   import_name = "..."        only when import name differs from package name
#
# Per-checker config lives in subtables: [packages.NAME.side_effects]
# Use subtable form ([packages.NAME]) when you need per-checker config.
# Use inline form (NAME = { ... }) for identity-only entries.

# ── Web frameworks ────────────────────────────────────────────────────
[packages.django]
category = "web"
detect = { deps = ["django"] }

[packages.django.orphan]
patterns = ["*/migrations/*.py", "*/management/commands/*.py"]

[packages.django.side_effects]
safe_calls = ["setup"]

[packages.django.side_effects.file_roles]
debug = ["apps.py", "admin.py", "signals.py", "manage.py", "urls.py"]

[packages.flask]
category = "web"
detect = { deps = ["flask"] }

[packages.flask.side_effects]
safe_calls = ["from_object", "from_envvar"]

[packages.flask.side_effects.file_roles]
debug = ["extensions.py", "factory.py"]

[packages.fastapi]
category = "web"
detect = { deps = ["fastapi"] }

[packages.fastapi.orphan]
patterns = ["docs_src/**"]   # fastapi's tutorial snippets — not production code

[packages.fastapi.side_effects]
safe_calls = ["lifespan"]

[packages.fastapi.side_effects.file_roles]
debug = ["dependencies.py", "lifespan.py", "middleware.py"]

