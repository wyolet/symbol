# ca-tools built-in spec — community-maintained detection patterns.
# Full schema reference: docs/spec-schema.md
#
# To contribute: add packages, checker configs, or framework rules here.
# No Python code changes needed — the spec is the extension point.
#
# Loading order (later overrides earlier):
#   1. This file (built-in)
#   2. Plugin specs (installed packages via entry points)
#   3. Project spec (ca-tools.spec.toml at project root)
#
# ── Package entry shape ───────────────────────────────────────────────
# [packages.NAME]
#   category    = "..."        # required, must match a [categories] key
#   type        = "lib|tool|app"  # required
#   stdlib      = false        # true for stdlib modules
#   import_name = "..."        # only when import name differs from package name
#
# [packages.NAME.side_effects]
#   module_level = "debug|info|warning|error|critical"
#                              # severity when called at module level
#                              # default: warning
# ─────────────────────────────────────────────────────────────────────

