# ── Side effects ──────────────────────────────────────────────────────
# Global rules for the side_effects checker.
# Per-package overrides live under [packages.X.side_effects].
#
# Severity resolution order (highest wins):
#   1. [packages.X.side_effects] module_level  — package-specific
#   2. [side_effects.file_roles]               — file basename role
#   3. default WARNING

[side_effects]
# Leaf function names that are safe / expected at module level — never flagged.
safe_calls = [
    "getLogger",
    "basicConfig",
    "TypeVar",
    "NewType",
    "ParamSpec",
    "TypeVarTuple",
    "namedtuple",
    "Path",
    "PurePath",
    "Enum",
    "IntEnum",
    "StrEnum",
    "FastAPI",
    "Flask",
    "Celery",
    "APIRouter",
    "Router",
    "Blueprint",
    "Namespace",
]

# Leaf function names known to have real side effects — always flagged even if uppercase.
known_effects = [
    "load_dotenv",
    "create_engine",
    "configure",
    "setup",
    "init",
    "register",
    "connect",
    "patch",
    "monkey_patch",
    "monkey.patch_all",
    "eventlet.monkey_patch",
    "gevent.monkey.patch_all",
]

# File roles — maps severity level to list of basenames.
# debug   = side effects are EXPECTED here (entry points, config, app wiring)
# error   = side effects are UNEXPECTED here (pure logic modules — almost always a bug)
# warning = default for everything not listed (no entry needed)
[side_effects.file_roles]
debug = [
    # Generic entry points
    "main.py",
    "__main__.py",
    "run.py",
    "app.py",
    "server.py",
    "start.py",
    # Config / environment
    "settings.py",
    "config.py",
    "configuration.py",
    "env.py",
    # WSGI/ASGI adapters
    "wsgi.py",
    "asgi.py",
    # Task queue config
    "celeryconf.py",
    "celery.py",
    # Test infrastructure
    "conftest.py",
]
error = [
    # Data layer
    "models.py",
    "schemas.py",
    "serializers.py",
    "types.py",
    "enums.py",
    "constants.py",
    # Business logic
    "utils.py",
    "helpers.py",
    "validators.py",
    "mixins.py",
    "decorators.py",
    # Web layer
    "forms.py",
    "filters.py",
    "permissions.py",
    # Error handling
    "exceptions.py",
    "errors.py",
]

# Package-level side_effects config lives under [packages.X.side_effects].
# The global package_roles section is no longer needed — per-package config
# is more precise and keeps everything co-located with the package definition.

# ── Entry points ──────────────────────────────────────────────────────
# Patterns for detecting application entry points.

[entrypoints]
# Full dotted call paths that mark an entry point (e.g. inside if __name__ guard).
starters = [
    "uvicorn.run",
    "uvicorn.main",
    "gunicorn.run",
    "celery.start",
    "celery.worker_main",
    "flask.run",
    "app.run",
    "tornado.ioloop.IOLoop.current().start",
    "asyncio.run",
    "typer.run",
]

# Bare function names that typically indicate entry points.
starter_names = [
    "run",
    "start",
    "main",
    "worker_main",
    "serve",
]


# ── File collection ───────────────────────────────────────────────────
# Directories skipped entirely when collecting Python files for analysis.
# Linguist (LOC) is unaffected — it scans files independently.
# Projects can extend this list via [tool.ca-tools] skip_dirs = [...].

# ── Stack checker config ──────────────────────────────────────────────
# Categories that count as "primary stack" in audit output.
# Must match keys defined in [categories].

[stack]
primary_categories = [
    "web", "orm", "database_driver", "task_queue", "llm", "migration",
]

# ── Orphan checker defaults ───────────────────────────────────────────
# Files skipped from orphan detection globally. Framework packages extend
# this via [packages.X.orphan] patterns.

[orphan]
skip_patterns = [
    # Python implicit entry points — always reachable by convention
    "__init__.py", "__main__.py", "setup.py", "manage.py",
    # Test infrastructure
    "conftest.py", "test_*.py", "*_test.py",
]

[files]
skip_dirs = [
    # Python environment noise — never production code
    "__pycache__", "venv", ".venv", "env", ".env",
    "node_modules", "bower_components",
    # VCS internals
    ".git", ".hg", ".svn",
    # Documentation — tutorial snippets, not production code
    "docs", "doc",
    # Scripts / tooling — not part of the import graph
    "scripts", "bin", "tools",
    # Demo / example code
    "examples", "example",
]

skip_patterns = [
    # Test files — add noise to import graph analysis
    "tests/**/*.py", "test/**/*.py",
    "test_*.py", "*_test.py",
    "conftest.py",
]

# ── ca init config ────────────────────────────────────────────────────
# Patterns used by ca init to auto-generate ignore lists.

[init]
# Side-effect call patterns considered expected/intentional — auto-added to ignore list.
safe_side_effect_patterns = [
    "*.include_router()",
    "*.add_middleware()",
    "*.add_route()",
    "*.add_event_handler()",
    "*.register_blueprint()",
    "*.add_url_rule()",
    "*.register()",
]
