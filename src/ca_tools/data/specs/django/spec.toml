name = "django"
category = "web"
detect = { deps = ["django"] }

[checkers.orphan]
patterns = [
    # Django loads these by convention via INSTALLED_APPS / settings — never imported directly
    "admin.py",
    "apps.py",
    "urls.py",
    "middleware.py",
    "backends.py",
    "context_processors.py",
    "signals.py",
    "receivers.py",
    "checks.py",
    "tasks.py",
    # Jinja2 extensions loaded via template engine TEMPLATES config
    "jinja2tags.py",
    # Django locale format modules — loaded dynamically via import_module()
    "*/locale/*/formats.py",
    # Discovered by path pattern
    "*/migrations/*.py",
    "*/management/commands/*.py",
    "*/templatetags/*.py",
]

[checkers.side_effects.calls]
skip = [
    "setup",
    # Django signal wiring — always intentional at module level
    "connect",
    # Django ORM lookup / filter / admin registration — idiomatic
    "register_lookup",
    "register",
    "autodiscover_modules",
]

[checkers.side_effects.patterns]
debug = ["apps.py", "admin.py", "signals.py", "manage.py", "urls.py"]
error = ["forms.py", "filters.py", "permissions.py"]
