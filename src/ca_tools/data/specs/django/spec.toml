name = "django"
category = "web"
detect = { deps = ["django"] }

[orphan]
patterns = ["*/migrations/*.py", "*/management/commands/*.py"]

[checkers.side_effects.calls]
skip = ["setup"]

[checkers.side_effects.patterns]
debug = ["apps.py", "admin.py", "signals.py", "manage.py", "urls.py"]
error = ["forms.py", "filters.py", "permissions.py"]
