name: Release to PyPI

on:
  push:
    tags: ["v*"]

permissions:
  contents: read  # job-level overrides bump this where they need more

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Cross-compile go-scan for every shipped platform
        # The wheel's ``artifacts`` glob (pyproject.toml) picks up everything
        # under src/wyolet/symbol/bin/, so binaries built here get bundled
        # automatically. Without this step, the wheel ships without any
        # go-scan binary and ``GoAstAdapter.is_enabled`` returns False on
        # every installed copy.
        run: make build-go-scan-all
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python 3.13
        run: uv python install 3.13
      - name: Build sdist + wheel
        run: uv build
      - name: Sanity-check Go binaries are in the wheel
        run: |
          set -euo pipefail
          wheel=$(ls dist/wyolet_symbol-*.whl)
          echo "Inspecting $wheel"
          if ! unzip -l "$wheel" | grep -q 'bin/go-scan-'; then
            echo "ERROR: wheel does not contain go-scan binaries" >&2
            unzip -l "$wheel" >&2
            exit 1
          fi
          unzip -l "$wheel" | grep 'bin/go-scan-'
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC for trusted publishing
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github_release:
    name: Create GitHub release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create the release
    steps:
      - uses: actions/checkout@v4
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Extract release notes for this tag from CHANGELOG.md
        # Pull the section between this version's heading and the next
        # ## heading. Falls back to a one-liner if extraction comes up
        # empty so the release isn't published with no body.
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { flag = 1; next }
            flag && /^## \[/        { flag = 0 }
            flag                    { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release for ${GITHUB_REF_NAME}." > release-notes.md
          fi
          echo "----- release-notes.md -----"
          cat release-notes.md
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: dist/*
